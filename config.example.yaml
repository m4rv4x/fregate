# ── Providers ─────────────────────────────────────────────
# Uncomment and fill the providers you want to benchmark.
# Fregate uses litellm under the hood — any provider supported
# by litellm works. See https://docs.litellm.ai/docs/providers

providers:
  - name: ollama-local
    type: ollama
    base_url: http://localhost:11434
    # models are auto-discovered from /api/tags

  # - name: openai
