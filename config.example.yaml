  #   api_key: ${CUSTOM_API_KEY}
  #   models:
  #     - your-model-name

# ── Tasks ─────────────────────────────────────────────────
# Built-in tasks are in tasks/ directory.
# Add custom task files here:
tasks_dir: ./tasks

# ── Scoring ───────────────────────────────────────────────
scoring:
  # Use an LLM to grade open-ended responses (set to false for pure regex scoring)
  llm_grading: true
  # Which provider/model to use for grading (defaults to first available)
  grader_provider: ollama-local
  grader_model: null  # null = first available model on the grader provider
  # Temperature for grading (lower = more consistent)
  grader_temperature: 0.1

# ── Output ────────────────────────────────────────────────
output:
  dir: ./reports
  format: markdown  # markdown | json | both
